apiVersion: v1
kind: Pod
metadata:
  name: dev-tools
  namespace: awaves-dev
  labels:
    app: dev-tools
    purpose: db-access
spec:
  automountServiceAccountToken: false
  containers:
    - name: dev-tools
      image: ubuntu:22.04
      command:
        - /bin/bash
        - -c
        - |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq && \
          apt-get install -y -qq \
            postgresql-client \
            redis-tools \
            awscli \
            curl \
            wget \
            vim \
            jq \
            iputils-ping \
            dnsutils && \
          echo "dev-tools ready" && \
          sleep infinity
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
  restartPolicy: Always
